<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>郵便番号検索ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 入力エリア：枠線で囲ったメイン部分 -->
  <div style="border: 1px solid black; padding: 5px; text-align: center; margin-bottom: 20px;">
    <h3>郵便番号</h3>
    <div style="text-align: left; padding-bottom: 20px; ">
      <!-- autocomplete="off" でブラウザ独自の履歴をオフに -->
      <input type="text" id="zipcode" inputmode="numeric" placeholder="例:1234567または123-4567" autocomplete="off">
      <button id="search-btn">住所検索</button>
      <button id="reset-btn">リセット</button>
    </div>
    
  </div>

  <!-- 上部の郵便番号表示エリア -->
  <p id="zip-display"></p>

  <!-- 結果表示テーブル -->
  <table>
    <thead>
      <tr>
        <th>zip code</th>
        <th>住所1</th>
        <th>住所2</th>
        <th>住所3</th>
        <th>住所1カナ</th>
        <th>住所2カナ</th>
        <th>住所3カナ</th>
        <th>pref code</th>
      </tr>
    </thead>
    <tbody id="result-body">
      <!-- JavaScriptでここに「読み込み中...」や「住所データ」が入ります -->
    </tbody>
  </table>

  <!-- 下部の郵便番号表示エリア -->
  <p id="zip-display-bottom"></p>

  <script src="main.js"></script>
</body>
</html>
